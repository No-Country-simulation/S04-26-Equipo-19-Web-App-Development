<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte Exitoso</title>
</head>
<body>
    <h1>{{ titulo }}</h1>

    <p><strong>Área:</strong> {{ area }}</p>

    <p><strong>Tipo:</strong> {{ tipo_incidente }}</p>

    <p><strong>Prioridad:</strong> {{ prioridad }}</p>

    <p><strong>Turno:</strong> {{ turno }}</p>

    <p><strong>Ubicación:</strong> {{ sector_ubicacion }}</p>

    <p><strong>Descripción:</strong> {{ descripcion }}</p>

    <p><strong>Estado:</strong> {{ estado }}</p>

    <p><strong>Reportado por:</strong> {{ reportado_por }}</p>

    <p><strong>Técnico:</strong> {{ tecnico }}</p>
    
    <a href="{% url 'crear_reporte' %}">Crear otro reporte</a>
    <a href="{% url 'logout' %}">Cerrar sesión</a>
</body>
</html>
