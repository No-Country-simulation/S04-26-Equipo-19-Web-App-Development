<!DOCTYPE html>
<html>
<head>
    <title>Crear Reporte</title>
</head>
<body>

    <p>Bienvenido, {{ user.username }}</p>

    <h1>Nuevo Reporte</h1>

    <form method="post">
        {% csrf_token %}

        <p>Fecha: {% now "d/m/Y H:i" %}</p><!-- muestra hora -->

        {{ form.as_p }}

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
