{% if reporte %}

<h1>Reporte asignado</h1>

<p>{{ reporte.tipo_incidente }}</p>
<p>{{ reporte.area }}</p>
<p>{{ reporte.descripcion }}</p>
<p>{{ reporte.prioridad }}</p>

<a href="{% url 'cerrar_reporte' reporte.id %}">
    Cerrar reporte
</a>

{% else %}

<h1>No tenés reportes asignados</h1>

{% endif %}
